<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtKante — Вход / Регистрация</title>
    <link rel="stylesheet" href="/styles/css/main.css">
    <script src="/Scripts/main.js" type="module" defer></script>
</head>
<body>
    <div class="auth">
        <header class="auth-header">
            <a href="/Pages/Home.html" class="auth-header__logo">
                <img src="/images/logo.svg" alt="ArtKante" width="100">
            </a>
            <a href="/Pages/Home.html" class="auth-header__back">
                <svg width="16" height="12" viewBox="0 0 27 19" fill="none">
                    <path d="M9.47319 18.5L0.499953 9.54511L9.44347 0.5M1.74624 9.54511H26.292" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                На главную
            </a>
        </header>

        <main class="auth-main">
            <div class="auth-card">

                <div class="auth-card__icon">
                    <svg width="32" height="42" viewBox="0 0 53 67" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M40.1318 36.1748L51.8076 66.1846H1.05273L12.7275 36.1748L12.7285 36.1758L26.4365 1.93652L40.1318 36.1748Z" fill="rgba(240,124,0,0.15)" stroke="rgba(240,124,0,0.6)" stroke-width="1.4"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M26.4376 27.29L23.1707 35.4291L14.8955 56.7112H37.9652L29.8052 35.7071L26.4376 27.29Z" fill="rgba(240,124,0,0.5)"/>
                        <path d="M30.4189 51.3735H22.4443L26.4365 41.2388L30.4189 51.3735Z" fill="rgba(255,255,255,0.7)"/>
                    </svg>
                </div>

                <div class="auth-tabs" role="tablist">
                    <button
                        class="auth-tab is-active"
                        role="tab"
                        aria-selected="true"
                        aria-controls="panel-login"
                        data-tab="login"
                    >Вход</button>
                    <button
                        class="auth-tab"
                        role="tab"
                        aria-selected="false"
                        aria-controls="panel-register"
                        data-tab="register"
                    >Регистрация</button>
                </div>

                <form
                    class="auth-form is-active"
                    id="panel-login"
                    role="tabpanel"
                    novalidate
                    data-form="login"
                >
                    <div class="auth-field">
                        <label class="auth-field__label" for="login-email">Email</label>
                        <input
                            class="auth-field__input"
                            type="email"
                            id="login-email"
                            name="email"
                            placeholder="your@email.ru"
                            autocomplete="email"
                        >
                        <span class="auth-field__error" id="login-email-error"></span>
                    </div>

                    <div class="auth-field">
                        <label class="auth-field__label" for="login-password">Пароль</label>
                        <div class="auth-field__input-wrap">
                            <input
                                class="auth-field__input"
                                type="password"
                                id="login-password"
                                name="password"
                                placeholder="••••••••"
                                autocomplete="current-password"
                            >
                            <button type="button" class="auth-field__toggle" aria-label="Показать пароль" data-toggle-password="login-password">
                                <svg width="18" height="14" viewBox="0 0 24 18" fill="none">
                                    <path d="M12 1C6.5 1 1.5 5 1 9C1.5 13 6.5 17 12 17C17.5 17 22.5 13 23 9C22.5 5 17.5 1 12 1Z" stroke="currentColor" stroke-width="1.5"/>
                                    <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                            </button>
                        </div>
                        <span class="auth-field__error" id="login-password-error"></span>
                    </div>

                    <button type="submit" class="auth-submit">
                        <span class="auth-submit__text">Войти</span>
                        <span class="auth-submit__spinner"></span>
                    </button>

                    <div class="auth-divider"><span>или</span></div>

                    <div class="auth-socials">
                        <button type="button" class="auth-social">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="rgba(255,255,255,0.5)"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="rgba(255,255,255,0.4)"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="rgba(255,255,255,0.35)"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="rgba(255,255,255,0.5)"/>
                            </svg>
                            Google
                        </button>
                        <button type="button" class="auth-social">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.09.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="rgba(255,255,255,0.5)"/>
                            </svg>
                            GitHub
                        </button>
                    </div>

                    <p class="auth-footnote">
                        Продолжая, вы соглашаетесь с&nbsp;
                        <a href="#" style="color:rgba(240,124,0,0.6)">политикой конфиденциальности</a>
                    </p>
                </form>

                <form
                    class="auth-form"
                    id="panel-register"
                    role="tabpanel"
                    novalidate
                    data-form="register"
                >
                    <div class="auth-field">
                        <p class="auth-section-label">Тип аккаунта</p>
                        <div class="auth-roles">
                            <label class="auth-role">
                                <input type="radio" name="role" value="client" checked>
                                <span class="auth-role__label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                                        <path d="M4 20c0-3.314 3.582-6 8-6s8 2.686 8 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                    </svg>
                                    Клиент
                                </span>
                            </label>
                            <label class="auth-role">
                                <input type="radio" name="role" value="designer">
                                <span class="auth-role__label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 3l2.5 6.5H21l-5.5 4 2 6.5L12 16l-5.5 4 2-6.5L3 9.5h6.5L12 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                    </svg>
                                    Дизайнер
                                </span>
                            </label>
                            <label class="auth-role">
                                <input type="radio" name="role" value="admin">
                                <span class="auth-role__label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                        <path d="M12 2l3 4h5l-2 5 2 5h-5l-3 4-3-4H4l2-5-2-5h5L12 2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                                    </svg>
                                    Мастер
                                </span>
                            </label>
                        </div>
                    </div>

                    <div class="auth-field">
                        <label class="auth-field__label" for="reg-name">Имя</label>
                        <input class="auth-field__input" type="text" id="reg-name" name="name" placeholder="Ирина Новоселова" autocomplete="name">
                        <span class="auth-field__error" id="reg-name-error"></span>
                    </div>

                    <div class="auth-field">
                        <label class="auth-field__label" for="reg-email">Email</label>
                        <input class="auth-field__input" type="email" id="reg-email" name="email" placeholder="your@email.ru" autocomplete="email">
                        <span class="auth-field__error" id="reg-email-error"></span>
                    </div>

                    <div class="auth-field">
                        <label class="auth-field__label" for="reg-phone">Телефон</label>
                        <input class="auth-field__input" type="tel" id="reg-phone" name="phone" placeholder="+7 (999) 000-00-00" autocomplete="tel">
                        <span class="auth-field__error" id="reg-phone-error"></span>
                    </div>

                    <div class="auth-field">
                        <label class="auth-field__label" for="reg-password">Пароль</label>
                        <div class="auth-field__input-wrap">
                            <input class="auth-field__input" type="password" id="reg-password" name="password" placeholder="Минимум 8 символов" autocomplete="new-password">
                            <button type="button" class="auth-field__toggle" aria-label="Показать пароль" data-toggle-password="reg-password">
                                <svg width="18" height="14" viewBox="0 0 24 18" fill="none">
                                    <path d="M12 1C6.5 1 1.5 5 1 9C1.5 13 6.5 17 12 17C17.5 17 22.5 13 23 9C22.5 5 17.5 1 12 1Z" stroke="currentColor" stroke-width="1.5"/>
                                    <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                            </button>
                        </div>
                        <div class="auth-strength" id="reg-strength">
                            <div class="auth-strength__bar" id="str-1"></div>
                            <div class="auth-strength__bar" id="str-2"></div>
                            <div class="auth-strength__bar" id="str-3"></div>
                            <div class="auth-strength__bar" id="str-4"></div>
                        </div>
                        <span class="auth-strength__text" id="reg-strength-text"></span>
                        <span class="auth-field__error" id="reg-password-error"></span>
                    </div>

                    <div class="auth-field">
                        <label class="auth-field__label" for="reg-password2">Повторите пароль</label>
                        <div class="auth-field__input-wrap">
                            <input class="auth-field__input" type="password" id="reg-password2" name="password2" placeholder="••••••••" autocomplete="new-password">
                            <button type="button" class="auth-field__toggle" aria-label="Показать пароль" data-toggle-password="reg-password2">
                                <svg width="18" height="14" viewBox="0 0 24 18" fill="none">
                                    <path d="M12 1C6.5 1 1.5 5 1 9C1.5 13 6.5 17 12 17C17.5 17 22.5 13 23 9C22.5 5 17.5 1 12 1Z" stroke="currentColor" stroke-width="1.5"/>
                                    <circle cx="12" cy="9" r="3" stroke="currentColor" stroke-width="1.5"/>
                                </svg>
                            </button>
                        </div>
                        <span class="auth-field__error" id="reg-password2-error"></span>
                    </div>

                    <label class="auth-checkbox">
                        <input type="checkbox" id="reg-agree" name="agree">
                        <span class="auth-checkbox__box">
                            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                                <path d="M1 4l3 3L9 1" stroke="#F07C00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                        <span class="auth-checkbox__text">
                            Я принимаю <a href="#">условия использования</a> и
                            <a href="#">политику конфиденциальности</a> ArtKante
                        </span>
                    </label>
                    <span class="auth-field__error" id="reg-agree-error"></span>

                    <button type="submit" class="auth-submit">
                        <span class="auth-submit__text">Создать аккаунт</span>
                        <span class="auth-submit__spinner"></span>
                    </button>

                    <p class="auth-footnote">
                        Уже есть аккаунт?&nbsp;
                        <a href="#" style="color:rgba(240,124,0,0.7)" data-switch-tab="login">Войти</a>
                    </p>
                </form>
            </div>
        </main>
    </div>

    <div class="auth-toast" id="auth-toast" role="alert" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" id="toast-icon">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-5l5 2.5-5 2.5zm0-7.5v-3l7 3.5L10 12V9z" fill="currentColor" opacity="0.7"/>
        </svg>
        <span id="toast-text"></span>
    </div>
</body>
</html>
